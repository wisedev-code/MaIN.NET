name: Build, Test, and Publish NuGet Package

on:
  push:
    branches:
      - main
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x' # Change to your project’s .NET version

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        run: dotnet test --configuration Release --no-build --verbosity normal


        - name: Get current version
          id: current-version
          run: |
            VERSION=$(grep -oP '<Version>\K[^<]+' Shot.Core.csproj)
            echo "VERSION=$VERSION" >> $GITHUB_ENV
            echo "Current version: $VERSION"
        
    
            
        - name: Get previous version
          id: previous-version
          run: |
            git fetch
            git checkout ${{ github.event.before }}
            if [ -f Shot.Core.csproj ]; then
              PREV_VERSION=$(grep -oP '<Version>\K[^<]+' Shot.Core.csproj)
              echo "PREV_VERSION=$PREV_VERSION" >> $GITHUB_ENV
              echo "Previous version: $PREV_VERSION"
            else
              echo "PREV_VERSION=0.0.0" >> $GITHUB_ENV
              echo "Previous version file not found, using 0.0.0"
            fi
            git checkout ${{ github.sha }}

        
        - name: Compare versions
          id: compare-versions
          run: |
            CURRENT_VERSION=${{ env.VERSION }}
            PREVIOUS_VERSION=${{ env.PREV_VERSION }}
            
            # Split versions into components
            IFS='.' read -ra CURRENT <<< "$CURRENT_VERSION"
            IFS='.' read -ra PREVIOUS <<< "$PREVIOUS_VERSION"
            
            # Compare version components
            IS_HIGHER=false
            for i in {0..2}; do
              if [ "${CURRENT[$i]}" -gt "${PREVIOUS[$i]}" ]; then
                IS_HIGHER=true
                break
              elif [ "${CURRENT[$i]}" -lt "${PREVIOUS[$i]}" ]; then
                break
              fi
            done
            
            if [ "$IS_HIGHER" = true ]; then
              echo "VERSION_INCREASED=true" >> $GITHUB_ENV
              echo "Version increased from $PREVIOUS_VERSION to $CURRENT_VERSION"
            else
              echo "VERSION_INCREASED=false" >> $GITHUB_ENV
              echo "Version did not increase"
            fi



      - name: Pack NuGet package
        if: env.VERSION_INCREASED == 'true'
        run: dotnet pack --configuration Release --output ./artifacts

