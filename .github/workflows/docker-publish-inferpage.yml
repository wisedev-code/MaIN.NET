name: Build and Publish InferPage Docker Images

on:
  push:
    branches: [main]

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for linux/arm64 cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push CPU image (linux/amd64 + linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: ./src
          file: ./src/Dockerfile.inferpage
          target: runtime-cpu
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            inza124/main-inferpage:cpu
            inza124/main-inferpage:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push CUDA image (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: ./src
          file: ./src/Dockerfile.inferpage
          target: runtime-cuda
          platforms: linux/amd64
          push: true
          tags: inza124/main-inferpage:cuda
          cache-from: type=gha
          cache-to: type=gha,mode=max
